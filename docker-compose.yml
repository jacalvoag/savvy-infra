version: '3.8'
services:
  # PostgreSQL: Core database para usuarios, movimientos, metas, grupos
  postgres:
    image: postgres:16-alpine
    container_name: savvy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-savvy}
      POSTGRES_USER: ${DB_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-postgres}
      # Variables para el script de init
      APP_USER: ${DB_USER:-savvy_app}
      APP_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./init-roles.sh:/docker-entrypoint-initdb.d/02-roles.sh:ro
    networks:
      - savvy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-postgres} -d ${DB_NAME:-savvy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  savvy-network:
    driver: bridge
    name: savvy-network