version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: savvy-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-savvy}
      POSTGRES_USER: ${POSTGRES_USER:-savvy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-savvy_user} -d ${POSTGRES_DB:-savvy}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - savvy-network

volumes:
  postgres_data:
    driver: local

networks:
  savvy-network:
    driver: bridge
    name: savvy-network